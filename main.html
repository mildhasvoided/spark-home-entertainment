<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Mouse Coordinates on Ctrl + Shift</title>
<style>
  #coords {
    position: fixed;
    bottom: 5px;
    left: 5px;
    background: black;
    color: lime;
    font-family: 'Courier New', Courier, monospace;
    font-size: 14px;
    padding: 4px 8px;
    border: 2px solid #00ff00;
    border-radius: 4px;
    user-select: none;
    display: none;
    z-index: 9999;
  }
</style>
</head>
<body>
  <div id="coords">X: 0, Y: 0</div>

<script>
  const coordsBox = document.getElementById('coords');
  let ctrlPressed = false;
  let shiftPressed = false;
  let mouseX = 0;
  let mouseY = 0;
  let copied = false;

  function copyToClipboard(text) {
    navigator.clipboard.writeText(text).then(() => {
      copied = true;
      coordsBox.textContent = `Copied: ${text}`;
      setTimeout(() => {
        copied = false;
      }, 1500);
    });
  }

  window.addEventListener('keydown', (e) => {
    if (e.key === 'Control') ctrlPressed = true;
    if (e.key === 'Shift') shiftPressed = true;

    if (ctrlPressed) {
      coordsBox.style.display = 'block';
      coordsBox.textContent = `X: ${mouseX}, Y: ${mouseY}`;

      if (shiftPressed && !copied) {
        copyToClipboard(`${mouseX},${mouseY}`);
      }
    }
  });

  window.addEventListener('keyup', (e) => {
    if (e.key === 'Control') {
      ctrlPressed = false;
      coordsBox.style.display = 'none';
      copied = false;
    }
    if (e.key === 'Shift') shiftPressed = false;
  });

  window.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
    if (ctrlPressed && !copied) {
      coordsBox.textContent = `X: ${mouseX}, Y: ${mouseY}`;
    }
  });
</script>
</body>
</html>
