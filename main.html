<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Windows 95 Style Fullscreen Fade</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: black;
    font-family: 'MS Sans Serif', Tahoma, Geneva, sans-serif;
    overflow: hidden;
  }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
  }
  img {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: contain;
    opacity: 0;
    image-rendering: pixelated;
    transition: none; /* no CSS transition, JS handles fade */
  }
</style>
</head>
<body>
  <img src="logo.png" alt="Logo" id="logo" />
<script>
  const img = document.getElementById('logo');
  const durationSeconds = 30;
  const totalFrames = durationSeconds * 60; // approx 60fps
  let frame = 0;

  function animate() {
    if (frame <= totalFrames) {
      const progress = frame / totalFrames;
      img.style.opacity = progress.toFixed(3);
      frame++;
      requestAnimationFrame(animate);
    } else {
      setTimeout(() => {
        window.location.href = 'true.html';
      }, 800);
    }
  }

  img.onload = () => {
    animate();
  };
</script>
</body>
</html>
