<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Windows 95 Style Fade & Redirect</title>
<style>
  body {
    margin: 0;
    background: black; /* black background */
    font-family: 'MS Sans Serif', Tahoma, Geneva, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }
  img {
    position: relative;
    opacity: 0;
    max-width: 100vw;
    max-height: 100vh;
    transition: opacity 3s ease;
    image-rendering: pixelated; /* crisp, pixelated look */
  }
</style>
</head>
<body>
  <img src="logo.png" alt="Logo" id="logo" />
<script>
  const img = document.getElementById('logo');
  let scale = 3;   // start bigger than screen
  let opacity = 0; // start fully transparent

  // Initial transform and opacity
  img.style.transform = `scale(${scale})`;
  img.style.opacity = opacity;

  function animate() {
    if (scale > 1 || opacity < 1) {
      if (scale > 1) {
        scale -= 0.02; // shrink scale gradually
        if (scale < 1) scale = 1;
      }
      if (opacity < 1) {
        opacity += 0.01; // fade in gradually
        if (opacity > 1) opacity = 1;
      }
      img.style.transform = `scale(${scale.toFixed(2)})`;
      img.style.opacity = opacity.toFixed(2);
      requestAnimationFrame(animate);
    } else {
      // Wait a moment, then redirect
      setTimeout(() => {
        window.location.href = 'true.html';
      }, 800);
    }
  }

  img.onload = () => {
    animate();
  };
</script>
</body>
</html>
